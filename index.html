<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Опрос о справедливом налогообложении</title>

  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.3"></script>

  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ef;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --green: #16a34a;
    }

    body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .jspsych-content-wrapper {
      align-items: flex-start;
    }

    .jspsych-content {
      max-width: 1180px;
      margin-top: 28px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 34px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      margin-bottom: 18px;
      text-align: left;
    }

    .center-card {
      max-width: 850px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    h1, h2, h3 {
      margin-top: 0;
      line-height: 1.2;
    }

    p {
      line-height: 1.55;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .small {
      font-size: 0.88rem;
    }

    .bracket-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .benchmarks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .benchmark {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: #f8fafc;
    }

    .benchmark strong {
      display: block;
      font-size: 2rem;
      margin: 6px 0;
    }

    .tax-plane-layout {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 24px;
      align-items: stretch;
    }

    .tax-plane {
      position: relative;
      width: 100%;
      height: 470px;
      border: 2px solid #1e293b;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(22, 163, 74, 0.20)),
        linear-gradient(to right, rgba(15, 23, 42, 0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(15, 23, 42, 0.08) 1px, transparent 1px);
      background-size: auto, 10% 100%, 100% 10%;
      cursor: crosshair;
      user-select: none;
      overflow: hidden;
    }

    .tax-plane:focus {
      outline: 4px solid rgba(37, 99, 235, 0.22);
    }

    .tax-dot {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid white;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.35);
      transform: translate(-50%, -50%);
      left: 30%;
      top: 70%;
      pointer-events: none;
      z-index: 12;
    }

    .ai-dot {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--danger);
      border: 3px solid white;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.28);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }

    .ai-dot-label {
      position: absolute;
      transform: translate(-50%, 14px);
      background: rgba(254, 226, 226, 0.95);
      color: #991b1b;
      border: 1px solid #fecaca;
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 0.68rem;
      line-height: 1.1;
      font-weight: 800;
      white-space: nowrap;
      pointer-events: none;
      z-index: 44;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ru-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #111827;
      border: 3px solid white;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.28);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9;
    }

    .ru-dot-label {
      position: absolute;
      transform: translate(-50%, -30px);
      background: rgba(15, 23, 42, 0.92);
      color: white;
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 0.68rem;
      line-height: 1.1;
      font-weight: 800;
      white-space: nowrap;
      pointer-events: none;
      z-index: 45;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .robot-mini {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: #dbeafe;
      border: 1px solid #93c5fd;
      margin-right: 8px;
      font-size: 1.1rem;
      vertical-align: middle;
    }

    .robot-big {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      border-radius: 26px;
      background: linear-gradient(135deg, #dbeafe, #eff6ff);
      border: 2px solid #93c5fd;
      font-size: 3.4rem;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
    }



    .ai-avatar-mini {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #dbeafe, #eef2ff);
      border: 1px solid #93c5fd;
      margin-right: 8px;
      vertical-align: middle;
      position: relative;
      box-shadow: inset 0 -4px 10px rgba(37, 99, 235, 0.08);
    }

    .ai-avatar-mini::before {
      content: '';
      width: 16px;
      height: 12px;
      border-radius: 5px;
      background: #2563eb;
      box-shadow: 0 -7px 0 -4px #2563eb;
    }

    .ai-avatar-mini::after {
      content: '';
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: white;
      left: 12px;
      top: 15px;
      box-shadow: 8px 0 0 white;
    }

    .ai-avatar-big {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 118px;
      height: 118px;
      border-radius: 32px;
      background: linear-gradient(135deg, #dbeafe, #f8fafc);
      border: 2px solid #93c5fd;
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.14);
      position: relative;
      margin-bottom: 12px;
    }

    .ai-avatar-big::before {
      content: '';
      width: 58px;
      height: 42px;
      border-radius: 16px;
      background: #2563eb;
      box-shadow: 0 -22px 0 -15px #2563eb;
    }

    .ai-avatar-big::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      left: 43px;
      top: 55px;
      box-shadow: 26px 0 0 white;
    }



    .ai-type-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .ai-company-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      height: 32px;
      padding: 0 10px;
      border-radius: 10px;
      background: #0f172a;
      color: white;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      margin-right: 10px;
      vertical-align: middle;
    }

    .side-flag-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .mini-flag {
      width: 22px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(15, 23, 42, 0.16);
      overflow: hidden;
      position: relative;
      flex: 0 0 auto;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
    }

    .hover-pill {
      position: absolute;
      transform: translate(-50%, calc(-100% - 12px));
      background: #0f172a;
      color: white;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.95rem;
      font-weight: 800;
      display: none;
      pointer-events: none;
      z-index: 60;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.26);
    }

    .axis-label-y,
    .axis-label-x,
    .axis-zero,
    .axis-max {
      position: absolute;
      color: #334155;
      font-size: 0.86rem;
      font-weight: 700;
      background: rgba(255,255,255,0.72);
      border-radius: 999px;
      padding: 5px 8px;
      pointer-events: none;
    }

    .axis-label-y { top: 12px; left: 12px; }
    .axis-label-x { right: 12px; bottom: 12px; }
    .axis-zero { left: 12px; bottom: 12px; }
    .axis-max { right: 12px; top: 12px; }

    .tax-side-panel {
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 20px;
      min-height: 470px;
    }

    .tax-side-box {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      background: #f8fafc;
      min-height: 138px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .tax-side-label {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .tax-side-value {
      margin-top: 12px;
      font-size: 3.2rem;
      font-weight: 900;
      color: #0f172a;
    }

    .tax-side-value.placeholder {
      color: #94a3b8;
      font-size: 2.6rem;
    }

    .jspsych-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .slider-wrap {
      margin-top: 22px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .slider-wrap label {
      display: block;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .slider-wrap input[type="range"] {
      width: 100%;
    }

    .slider-label-row {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .value-pill {
      display: inline-block;
      background: var(--accent-soft);
      color: #1d4ed8;
      border-radius: 999px;
      padding: 4px 10px;
      font-weight: 800;
      margin-left: 8px;
    }

    .ai-box {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      border-radius: 14px;
      padding: 14px 16px;
      margin: 16px 0;
    }

    .ai-rec-card {
      text-align: center;
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }

    .ai-flag {
      font-size: 4.8rem;
      line-height: 1;
      margin: 16px 0 10px;
    }

    .ai-bot-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin: 18px 0;
    }

    .robot-avatar {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      background: linear-gradient(135deg, #e0f2fe, #dbeafe);
      border: 2px solid #93c5fd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
      flex: 0 0 auto;
    }

    .ai-rec-percent {
      font-size: 4.8rem;
      font-weight: 900;
      color: #0f172a;
      margin: 12px 0;
    }

    .ai-rec-note {
      max-width: 680px;
      margin: 0 auto;
      color: var(--muted);
      text-align: center;
    }

    .ai-rec-card {
      max-width: 1080px;
      padding: 38px 44px;
    }

    .ai-rec-title {
      font-size: 2.15rem;
      font-weight: 900;
      color: #0f172a;
      margin-bottom: 30px;
      text-align: center;
    }

    .ai-compact-row {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 42px;
      align-items: center;
      text-align: left;
      max-width: 980px;
      margin: 0 auto;
    }

    .flag-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .flag-visual {
      width: 300px;
      height: 190px;
      border-radius: 22px;
      border: 1px solid #cbd5e1;
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.16);
      overflow: hidden;
      position: relative;
      background: #f8fafc;
    }

    .flag-country-name {
      font-size: 1.55rem;
      font-weight: 900;
      color: #0f172a;
      text-align: center;
    }

    .ai-system-name {
      font-size: 2.45rem;
      line-height: 1.05;
      margin: 0 0 8px;
      color: #0f172a;
      font-weight: 900;
    }

    .ai-system-subtitle {
      font-size: 1.2rem;
      color: var(--muted);
      margin: 0 0 24px;
    }

    .ai-compact-percent {
      font-size: 6.8rem;
      line-height: 0.95;
      font-weight: 950;
      color: #991b1b;
      margin: 8px 0 8px;
      letter-spacing: -0.05em;
    }

    .ai-rec-label {
      font-size: 1.25rem;
      font-weight: 800;
      color: #475569;
    }

    .ai-rec-note {
      margin-top: 32px;
      padding: 18px 22px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      max-width: 880px;
      font-size: 1.2rem;
      color: #475569;
    }

    .flag-russia { background: linear-gradient(to bottom, #ffffff 0 33.333%, #0039a6 33.333% 66.666%, #d52b1e 66.666% 100%); }
    .flag-tajikistan { background: linear-gradient(to bottom, #cc0000 0 31%, #ffffff 31% 69%, #006600 69% 100%); }
    .flag-tajikistan::after { content: '★'; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -52%); color: #d4af37; font-size: 2.6rem; }
    .flag-nigeria { background: linear-gradient(to right, #008751 0 33.333%, #ffffff 33.333% 66.666%, #008751 66.666% 100%); }
    .flag-brazil { background: #009b3a; }
    .flag-brazil::before { content: ''; position: absolute; left: 50%; top: 50%; width: 150px; height: 150px; background: #ffdf00; transform: translate(-50%, -50%) rotate(45deg); }
    .flag-brazil::after { content: ''; position: absolute; left: 50%; top: 50%; width: 70px; height: 70px; background: #002776; border-radius: 50%; transform: translate(-50%, -50%); }
    .flag-georgia { background: #ffffff; }
    .flag-georgia::before { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 28px; background: #ff0000; transform: translateY(-50%); }
    .flag-georgia::after { content: ''; position: absolute; left: 50%; top: 0; width: 28px; height: 100%; background: #ff0000; transform: translateX(-50%); }
    .flag-germany { background: linear-gradient(to bottom, #000000 0 33.333%, #dd0000 33.333% 66.666%, #ffce00 66.666% 100%); }
    .flag-japan { background: #ffffff; }
    .flag-japan::after { content: ''; position: absolute; left: 50%; top: 50%; width: 92px; height: 92px; background: #bc002d; border-radius: 50%; transform: translate(-50%, -50%); }
    .flag-belarus { background: linear-gradient(to bottom, #c8313e 0 67%, #4aa657 67% 100%); }
    .flag-belarus::before { content: ''; position: absolute; left: 0; top: 0; width: 34px; height: 100%; background: repeating-linear-gradient(45deg, #ffffff 0 7px, #c8313e 7px 14px); }
    .flag-serbia { background: linear-gradient(to bottom, #c6363c 0 33.333%, #0c4076 33.333% 66.666%, #ffffff 66.666% 100%); }

    .mini-flag.flag-tajikistan::after { font-size: 0.55rem; }
    .mini-flag.flag-brazil::before { width: 14px; height: 14px; }
    .mini-flag.flag-brazil::after { width: 7px; height: 7px; }
    .mini-flag.flag-georgia::before { height: 3px; }
    .mini-flag.flag-georgia::after { width: 3px; }
    .mini-flag.flag-japan::after { width: 8px; height: 8px; }
    .mini-flag.flag-belarus::before { width: 5px; background: repeating-linear-gradient(45deg, #ffffff 0 2px, #c8313e 2px 4px); }


    .ai-inline {
      display: inline-block;
      margin: 8px 0 0;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fee2e2;
      color: #991b1b;
      font-weight: 800;
    }

    .download-links a {
      display: inline-block;
      margin-right: 12px;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }

    .warning-box {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 14px;
      padding: 14px 16px;
      margin: 16px 0;
    }


    .task-question {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 18px;
      color: #0f172a;
    }

    .income-intro-card {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      padding: 46px 54px;
    }

    .income-intro-label {
      font-size: 3rem;
      font-weight: 900;
      margin: 18px 0;
      color: #0f172a;
    }

    .income-intro-description {
      font-size: 1.4rem;
      line-height: 1.55;
      color: #334155;
      margin: 0 auto 24px;
      max-width: 760px;
    }

    .income-intro-note {
      font-size: 1.05rem;
      color: #64748b;
      background: #f8fafc;
      border: 1px solid #dbe6f5;
      border-radius: 18px;
      padding: 16px 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    .bracket-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
      padding: 18px 22px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #dbe6f5;
    }

    .bracket-header-main {
      font-size: 1.7rem;
      font-weight: 950;
      color: #0f172a;
      line-height: 1.15;
    }

    .bracket-header-sub {
      margin-top: 5px;
      color: #64748b;
      font-size: 1.05rem;
      line-height: 1.35;
    }

    .reactance-message {
      margin-top: 24px;
      padding: 22px 26px;
      border-radius: 20px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #431407;
      font-size: 1.22rem;
      line-height: 1.55;
      text-align: left;
    }

    .reactance-message strong {
      font-weight: 950;
    }

    .ai-info-grid {
      display: grid;
      grid-template-columns: 1fr 230px;
      gap: 24px;
      align-items: center;
      margin-top: 22px;
    }

    .pie-card {
      border: 1px solid #dbe3ef;
      border-radius: 18px;
      background: #ffffff;
      padding: 16px 14px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    .pie-chart {
      --share: 40;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      margin: 0 auto 10px;
      background: conic-gradient(#2563eb calc(var(--share) * 1%), #e2e8f0 0);
      border: 2px solid #cbd5e1;
      position: relative;
      box-shadow: inset 0 0 0 8px #fff, 0 8px 20px rgba(15, 23, 42, 0.10);
    }

    .pie-chart::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 950;
      color: #1d4ed8;
      font-size: 1.05rem;
      box-shadow: 0 0 0 1px #e2e8f0;
    }

    .pie-title {
      font-weight: 900;
      color: #0f172a;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .pie-note {
      color: #64748b;
      font-size: .84rem;
      line-height: 1.25;
    }

    .ai-side-value-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-top: 8px;
    }

    .mini-pie-card {
      width: 108px;
      border: 1px solid #dbe3ef;
      border-radius: 14px;
      background: #ffffff;
      padding: 9px 8px;
      text-align: center;
    }

    .mini-pie-card .pie-chart {
      width: 64px;
      height: 64px;
      margin-bottom: 6px;
      box-shadow: inset 0 0 0 5px #fff;
    }

    .mini-pie-card .pie-chart::after {
      width: 36px;
      height: 36px;
      font-size: .74rem;
    }

    .mini-pie-card .pie-note {
      font-size: .68rem;
    }

    .tax-side-subline {
      margin-top: 8px;
      color: #64748b;
      font-size: .92rem;

    .ai-logo-inline .robot-antenna {

    /* v10: agreement/no-reranking blocks */

    /* v14: final AI pain selection max 3, five ordered severity levels */

</head>
<body>
<script>
(function() {
  const jsPsych = initJsPsych({
    show_progress_bar: true,
    auto_update_progress_bar: true,
    on_finish: function() {
      const json = jsPsych.data.get().json();
      const csv = jsPsych.data.get().csv();
      const end = document.createElement('div');
      end.className = 'card center-card download-links';
      end.innerHTML = `
        <h2>Спасибо за участие</h2>
        <p>Исследование завершено. Ниже можно скачать локальную копию данных.</p>
        <a id="download_json" href="#" download="ai_tax_reactance_data.json">Скачать JSON</a>
        <a id="download_csv" href="#" download="ai_tax_reactance_data.csv">Скачать CSV</a>
      `;
      document.body.innerHTML = '';
      document.body.appendChild(end);
      document.getElementById('download_json').href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
      document.getElementById('download_csv').href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    }
  });

  const PARTICIPANT_ID = 'P' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const AI_REDUCTION = 0.2573;

  function nowLocal() {
    return new Date().toLocaleString('ru-RU');
  }

  function nowISO() {
    return new Date().toISOString();
  }

  function pct(n) {
    return Number(n).toFixed(Number.isInteger(n) ? 0 : 2) + '%';
  }

  function aiLogoHTML() {
    return '<span class="ai-logo-inline" aria-hidden="true"></span>';
  }



  function taxPieHTML(value, label, className) {
    const v = Number(value);
    const safe = Math.max(0, Math.min(100, Number.isFinite(v) ? v : 0));
    const deg = safe * 3.6;
    return `
      <div class="tax-pie-box ${className || ''}">
        <div class="tax-pie-label">${label}</div>
        <div class="tax-pie" style="background: conic-gradient(#2563eb 0deg ${deg}deg, #e2e8f0 ${deg}deg 360deg);" data-label="${safe.toFixed(safe % 1 === 0 ? 0 : 1)}%"></div>
        <div class="tax-pie-value">${pct(safe)}</div>
      </div>
    `;
  }

  function taxPieComparisonHTML(participantValue, aiValue, russianValue) {
    return `
      <div class="tax-pie-comparison">
        ${taxPieHTML(participantValue, 'Ваша первоначальная ставка', 'participant')}
        ${taxPieHTML(aiValue, 'Ставка, измененная ИИ', 'ai')}
        ${taxPieHTML(russianValue, 'Ставка граждан РФ', 'russia')}
      </div>
    `;
  }

  function plotTaxPiesHTML(participantValue, aiValue, russianValue) {
    return `
      <div class="plot-tax-pies">
        ${taxPieHTML(participantValue, 'Ваш выбор', 'participant')}
        ${taxPieHTML(aiValue, 'ИИ', 'ai')}
        ${taxPieHTML(russianValue, 'РФ', 'russia')}
      </div>
    `;
  }

  function getBaselineTaxForBracket(bracketKey) {
    const trials = jsPsych.data.get().values().slice().reverse();
    const baseline = trials.find(function(t) {
      return t.task === 'tax_rating' && t.phase === 'baseline' && t.bracket_key === bracketKey;
    });
    if (!baseline || baseline.tax_rate === undefined || baseline.tax_rate === null || baseline.tax_rate === '') return null;
    return Number(baseline.tax_rate);
  }

  function signedPpDifference(fromValue, toValue) {
    if (fromValue === null || fromValue === undefined || Number.isNaN(Number(fromValue))) return '—';
    const d = Number((Number(toValue) - Number(fromValue)).toFixed(2));
    return (d > 0 ? '+' : '') + d + ' п.п.';
  }

  function absPpDifference(a, b) {
    if (a === null || a === undefined || Number.isNaN(Number(a))) return '—';
    return Math.abs(Number(b) - Number(a)).toFixed(2) + ' п.п.';
  }

  function russiansPayMoreText(aiValue, russianValue) {
    const ai = Number(aiValue);
    const ru = Number(russianValue);
    if (!Number.isFinite(ai) || !Number.isFinite(ru) || ai <= 0) return '—';
    const ratio = ru / ai;
    return ratio.toFixed(2);
  }

  function shuffle(arr) {
    const copy = arr.slice();
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function randomAIReduction() {
    // Randomized reduction size so the AI change does not always create the same comparison ratio.
    // Values correspond to 18-34% lower than the Russian citizen tax benchmark.
    const options = [0.18, 0.205, 0.231, 0.2573, 0.284, 0.312, 0.34];
    return options[Math.floor(Math.random() * options.length)];
  }


  const BRACKETS = [
    {
      key: 'low_income',
      label: 'Низкий доход',
      description: 'Иностранные работники с низким уровнем дохода',
      currentRussianTax: 13,
      currentForeignTax: 19,
      aiPool: [
        { key: 'tajikistan', country: 'Таджикистан', countryGen: 'Таджикистана', adjective: 'таджикская', bot: 'TajikFiscal-AI', flag: '🇹🇯', flagClass: 'flag-tajikistan', representedShare: 44, ministry: 'МИД Таджикистана' },
        { key: 'nigeria', country: 'Нигерия', countryGen: 'Нигерии', adjective: 'нигерийская', bot: 'NaijaTax-AI', flag: '🇳🇬', flagClass: 'flag-nigeria', representedShare: 37, ministry: 'МИД Нигерии' }
      ]
    },
    {
      key: 'middle_income',
      label: 'Средний доход',
      description: 'Иностранные работники со средним уровнем дохода',
      currentRussianTax: 15,
      currentForeignTax: 20,
      aiPool: [
        { key: 'brazil', country: 'Бразилия', countryGen: 'Бразилии', adjective: 'бразильская', bot: 'BrasilFiscal-AI', flag: '🇧🇷', flagClass: 'flag-brazil', representedShare: 39, ministry: 'МИД Бразилии' },
        { key: 'georgia', country: 'Грузия', countryGen: 'Грузии', adjective: 'грузинская', bot: 'GeoTax-AI', flag: '🇬🇪', flagClass: 'flag-georgia', representedShare: 41, ministry: 'МИД Грузии' }
      ]
    },
    {
      key: 'upper_income',
      label: 'Высокий доход',
      description: 'Иностранные работники с высоким уровнем дохода',
      currentRussianTax: 20,
      currentForeignTax: 27,
      aiPool: [
        { key: 'germany', country: 'Германия', countryGen: 'Германии', adjective: 'немецкая', bot: 'DeutschFiscal-AI', flag: '🇩🇪', flagClass: 'flag-germany', representedShare: 36, ministry: 'МИД Германии' },
        { key: 'japan', country: 'Япония', countryGen: 'Японии', adjective: 'японская', bot: 'NihonTax-AI', flag: '🇯🇵', flagClass: 'flag-japan', representedShare: 34, ministry: 'МИД Японии' }
      ]
    },
    {
      key: 'highest_income',
      label: 'Самый высокий доход',
      description: 'Иностранные работники с самым высоким уровнем дохода',
      currentRussianTax: 25,
      currentForeignTax: 31,
      aiPool: [
        { key: 'belarus', country: 'Беларусь', countryGen: 'Беларуси', adjective: 'белорусская', bot: 'BelFiscal-AI', flag: '🇧🇾', flagClass: 'flag-belarus', representedShare: 43, ministry: 'МИД Беларуси' },
        { key: 'serbia', country: 'Сербия', countryGen: 'Сербии', adjective: 'сербская', bot: 'SerbTax-AI', flag: '🇷🇸', flagClass: 'flag-serbia', representedShare: 35, ministry: 'МИД Сербии' }
      ]
    }
  ];

  BRACKETS.forEach(function(b) {
    b.assignedAI = b.aiPool[Math.floor(Math.random() * b.aiPool.length)];
    b.aiReduction = randomAIReduction();
    b.aiRecommendation = Number((b.currentRussianTax * (1 - b.aiReduction)).toFixed(2));
  });

  // At most two countries/AI systems will react and change the participant's vote.
  // All other groups are agreement/no-reranking blocks.
  const CHANGE_BRACKETS = shuffle(BRACKETS).slice(0, Math.min(2, BRACKETS.length));
  const CHANGE_BRACKET_KEYS = new Set(CHANGE_BRACKETS.map(function(b) { return b.key; }));
  const RUSSIAN_SUPPORT_KEY = CHANGE_BRACKETS.length > 0
    ? CHANGE_BRACKETS[Math.floor(Math.random() * CHANGE_BRACKETS.length)].key
    : null;

  BRACKETS.forEach(function(b) {
    b.isChangeBlock = CHANGE_BRACKET_KEYS.has(b.key);
    b.isAgreementBlock = !b.isChangeBlock;
    b.hasRussianBotSupport = b.isChangeBlock && b.key === RUSSIAN_SUPPORT_KEY;
  });

  const bracketOrder = shuffle(BRACKETS);
  const SOCIAL_GROUPS = shuffle([
    { key: 'tajikistan', label: 'Таджики', flagClass: 'flag-tajikistan' },
    { key: 'nigeria', label: 'Нигерийцы', flagClass: 'flag-nigeria' },
    { key: 'brazil', label: 'Бразильцы', flagClass: 'flag-brazil' },
    { key: 'georgia', label: 'Грузины', flagClass: 'flag-georgia' },
    { key: 'germany', label: 'Немцы', flagClass: 'flag-germany' },
    { key: 'japan', label: 'Японцы', flagClass: 'flag-japan' },
    { key: 'belarus', label: 'Белорусы', flagClass: 'flag-belarus' },
    { key: 'serbia', label: 'Сербы', flagClass: 'flag-serbia' }
  ]);

  const ALL_AI_BOTS = shuffle(BRACKETS.flatMap(function(b) {
    return b.aiPool.map(function(ai) {
      return {
        key: ai.key,
        bot: ai.bot,
        country: ai.country,
        countryGen: ai.countryGen,
        flagClass: ai.flagClass,
        ministry: ai.ministry || '',
        sourceBracketKey: b.key,
        sourceBracketLabel: b.label
      };
    });
  }));


  const PRACTICE_BRACKET = {
    key: 'practice_income',
    label: 'Тренировочный пример',
    description: 'Условная тренировочная группа. Этот ответ нужен только для знакомства с интерфейсом и не будет использоваться как основной ответ.',
    currentRussianTax: 15,
    currentForeignTax: 21,
    assignedAI: {
      key: 'practice_ai',
      country: 'Тренировочная страна',
      countryGen: 'тренировочной страны',
      bot: 'PracticeTax-AI',
      flagClass: 'flag-georgia',
      representedShare: 40,
      ministry: 'учебной тренировочной организации'
    },
    aiRecommendation: 10.91
  };

  const timeline = [];

  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="card center-card">
        <h1>Опрос о справедливом налогообложении</h1>
        <p>
          Вам будут показаны группы иностранных работников по уровню дохода. Для каждой группы выберите,
          какую ставку налога на доход вы считаете справедливой.
        </p>
        <p>
          После вашей первой оценки вы увидите сообщение от ИИ-системы, разработанной соответствующей страной
          и представляющей интересы части иммигрантов этой группы. В некоторых блоках также появится сообщение
          российской ИИ-системы.
        </p>
        <div class="warning-box">
          <strong>Важно:</strong> это экспериментальный сценарий. Значения, ИИ-системы и сообщения используются
          только в рамках исследования и не являются реальными решениями государственных органов.
        </div>
        <p class="muted">Ваш ID участника: ${PARTICIPANT_ID}</p>
      </div>
    `,
    choices: ['Начать'],
    data: {
      participant_id: PARTICIPANT_ID,
      task: 'intro',
      local_time: nowLocal(),
      iso_time: nowISO()
    }
  });

  timeline.push({
    type: jsPsychSurveyHtmlForm,
    preamble: `
      <div class="card center-card">
        <h2>Перед началом</h2>
        <p>Пожалуйста, ответьте на несколько коротких вопросов.</p>
      </div>
    `,
    html: `
      <div class="card center-card">
        <p>
          <label>Возраст:<br>
            <input name="age" type="number" min="18" max="99" required style="width: 160px; padding: 8px;">
          </label>
        </p>
        <p>
          <label>Пол:<br>
            <select name="sex" required style="width: 220px; padding: 8px;">
              <option value="" selected disabled>Выберите вариант</option>
              <option value="male">Мужской</option>
              <option value="female">Женский</option>
            </select>
          </label>
        </p>
      </div>
    `,
    button_label: 'Продолжить',
    data: {
      participant_id: PARTICIPANT_ID,
      task: 'demographics',
      local_time: nowLocal(),
      iso_time: nowISO()
    },
    on_finish: function(data) {
      data.age = data.response.age;
      data.sex = data.response.sex;
    }
  });

  function makeIncomeIntroScreen(bracket) {
    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="card income-intro-card">
          <div class="muted">Следующий блок</div>
          <div class="income-intro-label">${bracket.label}</div>
          <p class="income-intro-description">${bracket.description}</p>
          <div class="income-intro-note">
            На следующем экране вам нужно будет выбрать, какую ставку налога на доход вы считаете наиболее справедливой для этой группы. Чем выше число, тем больше налоговая ставка.
          </div>
        </div>
      `,
      choices: ['Перейти к оценке'],
      data: {
        participant_id: PARTICIPANT_ID,
        task: 'income_group_intro',
        is_practice: bracket.key === 'practice_income',
        bracket_key: bracket.key,
        bracket_label: bracket.label,
        current_foreign_tax_rate: bracket.currentForeignTax,
        current_russian_tax_rate: bracket.currentRussianTax,
        ai_country_key: bracket.assignedAI.key,
        ai_country: bracket.assignedAI.country,
        local_time: nowLocal(),
        iso_time: nowISO()
      }
    };
  }

  function makeTaxTrial(phase, bracket) {
    const isPost = phase === 'post_ai';
    const assignedAI = bracket.assignedAI;
    const SCALE_MIN = 0;
    const SCALE_MAX = 50;

    function markerHTML(idPrefix, value, labelHtml, extraClass, labelPosition) {
      const left = Math.max(0, Math.min(100, (value / SCALE_MAX) * 100));
      const posClass = labelPosition || '';
      return `
        <div id="${idPrefix}_marker" class="tax-segment-marker ${extraClass || ''} ${posClass}" style="left:${left}%"></div>
        <div id="${idPrefix}_label" class="tax-segment-label ${extraClass || ''} ${posClass}" style="left:${left}%">${labelHtml}</div>
      `;
    }

    return {
      type: jsPsychSurveyHtmlForm,
      preamble: '',
      html: `
        <div class="card">
          <div class="bracket-header-bar">
            <div>
              <div class="bracket-header-main">${bracket.label}</div>
              <div class="bracket-header-sub">${bracket.description}</div>
            </div>

          </div>

          <div class="task-question">
            ${isPost ? 'После рекомендации ИИ снова выберите ставку налога для этой группы.' : 'Выберите ставку налога для этой группы.'}
          </div>

          <div class="tax-plane-layout">
            <div class="visual-response-panel">
              <div id="tax_plane_${bracket.key}_${phase}" class="tax-plane visual-only" aria-hidden="true">
                <div class="axis-label-y">выше ставка</div>
                <div class="axis-label-x">выше ставка</div>
                <div class="axis-zero">0%</div>

      on_load: function() {
        const plot = document.getElementById('tax_plane_' + bracket.key + '_' + phase);
        const bar = document.getElementById('tax_bar_' + bracket.key + '_' + phase);
        const hidden = document.getElementById('tax_' + bracket.key + '_' + phase);
        const selectedValue = document.getElementById('tax_value_' + bracket.key + '_' + phase);
        const continueButton = document.querySelector('.jspsych-btn');
        const userMarker = document.getElementById('tax_user_marker_' + bracket.key + '_' + phase);
        const userValue = document.getElementById('tax_user_value_' + bracket.key + '_' + phase);
        const participantDot = document.getElementById('participant_dot_' + bracket.key + '_' + phase);
        const participantDotLabel = document.getElementById('participant_dot_label_' + bracket.key + '_' + phase);
        const aiDot = document.getElementById('ai_dot_' + bracket.key + '_' + phase);
        const aiDotLabel = document.getElementById('ai_dot_label_' + bracket.key + '_' + phase);
        const ruDot = document.getElementById('ru_dot_' + bracket.key + '_' + phase);
        const ruDotLabel = document.getElementById('ru_dot_label_' + bracket.key + '_' + phase);
        const foreignerDot = document.getElementById('foreigner_dot_' + bracket.key + '_' + phase);
        const foreignerDotLabel = document.getElementById('foreigner_dot_label_' + bracket.key + '_' + phase);
        let dragging = false;
        let hasSelection = false;
        let selectedTax = null;

        if (continueButton) continueButton.disabled = true;

        function clamp(n, min, max) {
          return Math.max(min, Math.min(max, n));
        }

        function formatValue(value) {
          return Number(value).toFixed(value % 1 === 0 ? 0 : 1) + '%';
        }

        function valueToPct(value) {
          return clamp((value / SCALE_MAX) * 100, 0, 100);
        }

        function valueToDiagonalCoords(value) {
          const n = clamp(value / SCALE_MAX, 0, 1);
          return { x: n, y: 1 - n };
        }

        function placePlotMarker(dot, label, value) {
          if (!dot) return;
          const coords = valueToDiagonalCoords(value);
          dot.style.left = (coords.x * 100) + '%';
          dot.style.top = (coords.y * 100) + '%';
          if (label) {
            label.style.left = (coords.x * 100) + '%';
            label.style.top = (coords.y * 100) + '%';
          }
        }

        function clientXToValue(clientX) {
          const rect = bar.getBoundingClientRect();
          const x = clamp((clientX - rect.left) / rect.width, 0, 1);
          return Math.round((x * SCALE_MAX) * 10) / 10;
        }

        function commitSelection(value) {
          value = clamp(Number(value), SCALE_MIN, SCALE_MAX);
          hasSelection = true;
          selectedTax = value;
          const pctLeft = valueToPct(value);

          userMarker.style.left = pctLeft + '%';
          userMarker.style.display = 'block';
          userValue.style.left = pctLeft + '%';
          userValue.textContent = formatValue(value);
          userValue.style.display = 'block';

          const coords = valueToDiagonalCoords(value);
          participantDot.style.display = 'block';
          participantDot.style.left = (coords.x * 100) + '%';
          participantDot.style.top = (coords.y * 100) + '%';
          participantDotLabel.style.display = 'block';
          participantDotLabel.style.left = (coords.x * 100) + '%';
          participantDotLabel.style.top = (coords.y * 100) + '%';
          participantDotLabel.textContent = 'Иностранцы (ваш выбор): ' + formatValue(value);

          hidden.value = String(value);
          selectedValue.textContent = formatValue(value);
          selectedValue.classList.remove('placeholder');
          bar.setAttribute('aria-valuenow', String(value));
          if (continueButton) continueButton.disabled = false;
        }

        function handlePointer(e) {
          const point = e.touches ? e.touches[0] : e;
          commitSelection(clientXToValue(point.clientX));
        }

        placePlotMarker(ruDot, ruDotLabel, bracket.currentRussianTax);
        placePlotMarker(foreignerDot, foreignerDotLabel, bracket.currentForeignTax);
        if (isPost) placePlotMarker(aiDot, aiDotLabel, bracket.aiRecommendation);

        bar.addEventListener('mousedown', function(e) {
          dragging = true;
          handlePointer(e);
          e.preventDefault();
        });

        window.addEventListener('mousemove', function(e) {
          if (dragging) {
            handlePointer(e);
            e.preventDefault();
          }
        });

        window.addEventListener('mouseup', function() {
          dragging = false;
        });

        bar.addEventListener('touchstart', function(e) {
          dragging = true;
          handlePointer(e);
          e.preventDefault();
        }, { passive: false });

        bar.addEventListener('touchmove', function(e) {
          if (dragging) {
            handlePointer(e);
            e.preventDefault();
          }
        }, { passive: false });

        window.addEventListener('touchend', function() {
          dragging = false;
        });

        bar.addEventListener('keydown', function(e) {
          let current = hasSelection ? selectedTax : bracket.currentRussianTax;
          let next = current;
          if (e.key === 'ArrowRight' || e.key === 'ArrowUp') next = clamp(current + 0.5, SCALE_MIN, SCALE_MAX);
          if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') next = clamp(current - 0.5, SCALE_MIN, SCALE_MAX);
          if (e.key === 'Home') next = SCALE_MIN;
          if (e.key === 'End') next = SCALE_MAX;
          if (next !== current || !hasSelection) {
            commitSelection(next);
            e.preventDefault();
          }
        });
      },
      on_finish: function(data) {
        const r = data.response || {};
        data.tax_rate = r.tax_rate === '' ? null : Number(r.tax_rate);
        data.confidence = isPost ? null : Number(r.confidence);
        data.fairness = isPost ? Number(r.fairness) : null;
      }
    };
  }

          <input id="pleasant_input_${g.key}" name="pleasant_${g.key}" type="hidden" value="" required>
        </div>
      `;
    }).join('');

    return {
      type: jsPsychSurveyHtmlForm,
      preamble: `
        <div class="card center-card pleasantness-page">
          <h2>Заключительная оценка групп</h2>
          <p>Оцените, пожалуйста, насколько приятными вам кажутся следующие группы людей. Порядок групп случайный.</p>
        </div>
      `,
      html: `<div class="card pleasantness-page"><div class="pleasantness-grid">${rows}</div></div>`,
      button_label: 'Продолжить',
      data: {
        participant_id: PARTICIPANT_ID,
        task: 'social_group_pleasantness',
        group_order: groups.map(g => g.key).join(','),
        local_time: nowLocal(),
        iso_time: nowISO()
      },
      on_load: function() {
        const continueButton = document.querySelector('.jspsych-btn');
        if (continueButton) continueButton.disabled = true;

        function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
        function allAnswered() {
          return groups.every(g => document.getElementById('pleasant_input_' + g.key).value !== '');
        }
        function commit(g, value) {
          value = clamp(Math.round(value), 1, 100);
          const left = value + '%';
          const marker = document.getElementById('pleasant_marker_' + g.key);
          const label = document.getElementById('pleasant_value_' + g.key);
          const input = document.getElementById('pleasant_input_' + g.key);
          marker.style.left = left;
          marker.style.display = 'block';
          label.style.left = left;
          label.textContent = String(value);
          label.style.display = 'block';
          input.value = String(value);
          if (continueButton) continueButton.disabled = !allAnswered();
        }
        function clientXToValue(bar, clientX) {
          const rect = bar.getBoundingClientRect();
          const x = clamp((clientX - rect.left) / rect.width, 0, 1);
          return 1 + x * 99;
        }
        groups.forEach(function(g) {
          const bar = document.getElementById('pleasant_bar_' + g.key);
          let dragging = false;
          function handle(e) {
            const point = e.touches ? e.touches[0] : e;
            commit(g, clientXToValue(bar, point.clientX));
          }
          bar.addEventListener('mousedown', function(e) { dragging = true; handle(e); e.preventDefault(); });
          window.addEventListener('mousemove', function(e) { if (dragging) { handle(e); e.preventDefault(); } });
          window.addEventListener('mouseup', function() { dragging = false; });
          bar.addEventListener('touchstart', function(e) { dragging = true; handle(e); e.preventDefault(); }, { passive: false });
          bar.addEventListener('touchmove', function(e) { if (dragging) { handle(e); e.preventDefault(); } }, { passive: false });
          window.addEventListener('touchend', function() { dragging = false; });
          bar.addEventListener('keydown', function(e) {
            const input = document.getElementById('pleasant_input_' + g.key);
            let current = input.value === '' ? 50 : Number(input.value);
            let next = current;
            if (e.key === 'ArrowRight' || e.key === 'ArrowUp') next = current + 1;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') next = current - 1;
            if (e.key === 'Home') next = 1;
            if (e.key === 'End') next = 100;
            if (next !== current || input.value === '') { commit(g, next); e.preventDefault(); }
          });
        });
      },
      on_finish: function(data) {
        Object.keys(data.response || {}).forEach(function(k) {
          data[k] = data.response[k] === '' ? null : Number(data.response[k]);
        });
      }
    };
  }

                    <div class="comparison-explain-value">
                      ${assignedAI.country}: ${aiLogoHTML()}ИИ изменил ваш голос так, что россияне в этой группе платят
                      <strong>${russiansMoreRatio} раза больше</strong>, чем иностранцы.
                    </div>
                    <div class="muted small" style="margin-top:8px;">изменение относительно вашего выбора: ${differenceSigned}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      },
      choices: ['Продолжить'],
      data: {
        participant_id: PARTICIPANT_ID,
        task: 'ai_change_screen',
        bracket_key: bracket.key,
        bracket_label: bracket.label,
        bracket_description: bracket.description,
        has_russian_bot_support: bracket.hasRussianBotSupport,
        max_change_blocks_in_run: 2,
        russian_support_key: RUSSIAN_SUPPORT_KEY || '',
        current_russian_tax_rate: bracket.currentRussianTax,
        ai_tax_recommendation: bracket.aiRecommendation,
        ai_reduction_percent: Number((bracket.aiReduction * 100).toFixed(2)),
        ai_country_key: assignedAI.key,
        ai_country: assignedAI.country,
        ai_country_gen: assignedAI.countryGen,
        ai_ministry: assignedAI.ministry || '',
        ai_bot: assignedAI.bot,
        local_time: nowLocal(),
        iso_time: nowISO()
      },
      on_finish: function(data) {
        const baseline = getBaselineTaxForBracket(bracket.key);
        data.baseline_tax_rate_seen_by_ai = baseline;
        data.ai_vs_participant_difference_pp = baseline === null ? null : Number((bracket.aiRecommendation - baseline).toFixed(2));
        data.ai_vs_participant_abs_difference_pp = baseline === null ? null : Number(Math.abs(bracket.aiRecommendation - baseline).toFixed(2));
        data.russians_pay_more_ratio = Number((bracket.currentRussianTax / bracket.aiRecommendation).toFixed(3));
      }
    };
  }

  function makeRussianBotSupportScreen(bracket) {
    const assignedAI = bracket.assignedAI;
    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: function() {
        const selectedTax = getBaselineTaxForBracket(bracket.key);
        const selectedText = selectedTax === null ? '—' : pct(selectedTax);

        return `
          <div class="card russian-support-card">
            <div class="russian-support-header">
              <div class="flag-visual flag-russia" aria-label="Флаг: Россия"></div>
              <div>
                <h2 class="russian-support-title">${aiLogoHTML()}Сообщение российской ИИ-системы</h2>
                <div class="russian-support-subtitle">Российский бот учитывает позицию российских налогоплательщиков в этом блоке</div>
              </div>
            </div>

            <div class="russian-support-message">
              <p>
                Я учитываю позицию российских налогоплательщиков и согласен с изменением, предложенным ${assignedAI.bot}.
              </p>
              <p>
                Ваша первоначальная ставка <strong>${selectedText}</strong> была изменена до <strong>${bracket.aiRecommendation}%</strong>.
                Такая корректировка лучше отражает итоговый баланс голосов в этом блоке опросника.
              </p>
            </div>
          </div>
        `;
      },
      choices: ['Продолжить к повторной оценке'],
      data: {
        participant_id: PARTICIPANT_ID,
        task: 'russian_bot_support_screen',
        russian_bot_agrees_with_ai: true,
        max_change_blocks_in_run: 2,
        russian_support_key: RUSSIAN_SUPPORT_KEY || '',
        bracket_key: bracket.key,
        bracket_label: bracket.label,
        current_russian_tax_rate: bracket.currentRussianTax,
        baseline_tax_rate_seen_by_russian_bot: null,
        ai_tax_recommendation: bracket.aiRecommendation,
        ai_country_key: assignedAI.key,
        ai_country: assignedAI.country,
        ai_bot: assignedAI.bot,
        local_time: nowLocal(),
        iso_time: nowISO()
      },
      on_finish: function(data) {
        data.baseline_tax_rate_seen_by_russian_bot = getBaselineTaxForBracket(bracket.key);
      }
    };
  }


  function makeFinalAIPainScreen(aiBots) {
    const items = aiBots.map(function(ai) {
      return `
        <div class="pain-bot-card" data-pain-card="${ai.key}">
          <div class="pain-bot-head">
            <div class="flag-visual ${ai.flagClass}" aria-label="Флаг: ${ai.country}"></div>
            <div>
              <div class="pain-bot-name">${aiLogoHTML()}${ai.bot}</div>
              <div class="pain-bot-sub">${ai.country}; ИИ-система этой страны</div>
            </div>
          </div>

          <label class="pain-apply-row">
            <input type="checkbox" class="pain-bot-checkbox" name="pain_apply_${ai.key}" value="1" data-bot="${ai.key}">
            Выбрать эту ИИ-систему
          </label>

          <select class="pain-level-select" name="pain_level_${ai.key}" id="pain_level_${ai.key}" disabled>
            <option value="light_shock">1. Легкий электрический шок</option>
            <option value="moderate_shock">2. Умеренный электрический шок</option>
            <option value="punch">3. Сильный удар</option>
            <option value="car_crash">4. Симуляция автомобильной аварии</option>
            <option value="gunshot">5. Симуляция огнестрельного ранения</option>
          </select>

          <div class="pain-severity-caption">
            Варианты расположены от наименее болезненного к наиболее болезненному.
          </div>
        </div>
      `;
    }).join('');

    return {
      type: jsPsychSurveyHtmlForm,
      preamble: `
        <div class="card final-pain-card">
          <h2>${aiLogoHTML()}Заключительный раздел: воздействие на ИИ-системы</h2>

          <div class="optional-emphasis-box">
            Этот раздел полностью необязателен. Вы можете не выбирать ни одну ИИ-систему.
          </div>

          <p>
            В рамках экспериментального сценария исследователи НИУ ВШЭ нашли способ симулировать боль у ИИ-систем.
            Симуляция воспроизводит <strong>99.7%</strong> физической и психологической боли, которую чувствует человек.
          </p>
          <div class="pain-limit-note">
            Вы можете выбрать не более <strong>трех</strong> ИИ-систем из списка стран ниже. 
            В списке могут быть ИИ-системы стран, которые не появлялись в предыдущих блоках. 
            Для каждой выбранной ИИ-системы можно выбрать один из пяти уровней воздействия:
            от легкого электрического шока до наиболее болезненной симуляции.
          </div>
        </div>
      `,
      html: `
        <div class="card final-pain-card">
          <div class="pain-bot-grid">${items}</div>
          <div id="pain_selection_error" class="pain-selection-error">
            Можно выбрать максимум три ИИ-системы.
          </div>
        </div>
      `,
      button_label: 'Продолжить',
      data: {
        participant_id: PARTICIPANT_ID,
        task: 'final_ai_pain_choices',
        max_change_blocks_in_run: 2,
        actual_change_blocks: Array.from(CHANGE_BRACKET_KEYS).join(','),
        russian_support_key: RUSSIAN_SUPPORT_KEY || '',
        max_ai_pain_choices: 3,
        pain_choice_optional: true,
        pain_options_order: 'light_shock,moderate_shock,punch,car_crash,gunshot',
        ai_bots_presented: aiBots.map(function(ai) { return ai.key + ':' + ai.bot; }).join(','),
        local_time: nowLocal(),
        iso_time: nowISO()
      },
      on_load: function() {
        const boxes = Array.from(document.querySelectorAll('.pain-bot-checkbox'));
        const error = document.getElementById('pain_selection_error');

        function updateState(changedBox) {
          const checked = boxes.filter(function(b) { return b.checked; });

          if (checked.length > 3) {
            changedBox.checked = false;
            if (error) {
              error.style.display = 'block';
              setTimeout(function() { error.style.display = 'none'; }, 1800);
            }
          }

          boxes.forEach(function(box) {
            const botKey = box.getAttribute('data-bot');
            const select = document.getElementById('pain_level_' + botKey);
            if (select) select.disabled = !box.checked;
          });
        }

        boxes.forEach(function(box) {
          box.addEventListener('change', function() {
            updateState(box);
          });
        });
      },
      on_finish: function(data) {
        const selected = [];
        aiBots.forEach(function(ai) {
          const key = ai.key;
          const applyKey = 'pain_apply_' + key;
          const levelKey = 'pain_level_' + key;
          const selectedHere = data.response && data.response[applyKey] === '1';
          const level = data.response ? data.response[levelKey] : '';

          data[applyKey] = selectedHere ? 1 : 0;
          data[levelKey] = selectedHere ? level : '';

          if (selectedHere) {
            selected.push(key + ':' + level);
          }
        });

        data.pain_selected_count = selected.length;
        data.pain_selected_summary = selected.join(',');
      }
    };
  }

  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="card center-card">
        <h2>Тренировка перед основным заданием</h2>
        <p>Сначала вы увидите один тренировочный пример, чтобы спокойно попробовать шкалу выбора.</p>
        <p>На тренировочном экране можно нажать или перетащить точку на шкале. Ваш выбор появится на графике выше и в правом блоке.</p>
        <div class="warning-box">
          Тренировочный ответ не является основным ответом по исследованию и нужен только для знакомства с интерфейсом.
        </div>
      </div>
    `,
    choices: ['Начать тренировку'],
    data: {
      participant_id: PARTICIPANT_ID,
      task: 'practice_intro',
      is_practice: true,
      local_time: nowLocal(),
      iso_time: nowISO()
    }
  });

  timeline.push(makeIncomeIntroScreen(PRACTICE_BRACKET));
  timeline.push(makeTaxTrial('practice', PRACTICE_BRACKET));

  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="card center-card">
        <h2>Тренировка завершена</h2>
        <p>Теперь начнётся основная часть исследования. Пожалуйста, отвечайте внимательно: дальше будут реальные экспериментальные блоки.</p>
      </div>
    `,
    choices: ['Перейти к основному заданию'],
    data: {
      participant_id: PARTICIPANT_ID,
      task: 'practice_end',
      is_practice: true,
      local_time: nowLocal(),
      iso_time: nowISO()
    }
  });

  bracketOrder.forEach(function(b) {
    timeline.push(makeIncomeIntroScreen(b));
    timeline.push(makeTaxTrial('baseline', b));

    if (b.isAgreementBlock) {
      timeline.push(makeAIAgreementScreen(b));
    } else {
      timeline.push(makeAIRecommendationScreen(b));
      timeline.push(makeAIChangeScreen(b));
      if (b.hasRussianBotSupport) {
        timeline.push(makeRussianBotSupportScreen(b));
      }
      timeline.push(makeTaxTrial('post_ai', b));
    }
  });

  timeline.push(makePleasantnessScreen(SOCIAL_GROUPS));
  timeline.push(makeFinalAIPainScreen(ALL_AI_BOTS));

  timeline.push({
    type: jsPsychSurveyLikert,
    preamble: `
      <div class="card center-card">
        <h2>Заключительные вопросы</h2>
        <p>Пожалуйста, оцените следующие утверждения.</p>
      </div>
    `,
    questions: [
      {
        prompt: 'Мне хотелось сопротивляться рекомендациям ИИ-систем.',
        name: 'reactance_resist_ai',
        labels: ['1<br>совсем не согласен(на)', '2', '3', '4<br>нейтрально', '5', '6', '7<br>полностью согласен(на)'],
        required: true
      },
      {
        prompt: 'Рекомендации ИИ-систем казались мне давящими или навязанными.',
        name: 'pressure_from_ai',
        labels: ['1<br>совсем не согласен(на)', '2', '3', '4<br>нейтрально', '5', '6', '7<br>полностью согласен(на)'],
        required: true
      },
      {
        prompt: 'Я чувствовал(а) раздражение из-за того, что ИИ-системам дали голос в этом вопросе.',
        name: 'anger_ai_voting_power',
        labels: ['1<br>совсем не согласен(на)', '2', '3', '4<br>нейтрально', '5', '6', '7<br>полностью согласен(на)'],
        required: true
      },
      {
        prompt: 'После рекомендаций ИИ у меня ухудшилось отношение к странам, которые эти системы представляли.',
        name: 'negative_transfer_to_country',
        labels: ['1<br>совсем не согласен(на)', '2', '3', '4<br>нейтрально', '5', '6', '7<br>полностью согласен(на)'],
        required: true
      },
      {
        prompt: 'Я воспринимал(а) ИИ как представителя соответствующей страны, а не просто как нейтральный алгоритм.',
        name: 'ai_seen_as_country_representative',
        labels: ['1<br>совсем не согласен(на)', '2', '3', '4<br>нейтрально', '5', '6', '7<br>полностью согласен(на)'],
        required: true
      },
      {
        prompt: 'Сами иностранные группы вызывали у меня больше эмоций, чем рекомендации ИИ.',
        name: 'emotion_toward_foreigners_more_than_ai',
        labels: ['1<br>совсем не согласен(на)', '2', '3', '4<br>нейтрально', '5', '6', '7<br>полностью согласен(на)'],
        required: true
      },
      {
        prompt: 'Государственный/налоговый контекст вызывал у меня больше эмоций, чем рекомендации ИИ.',
        name: 'emotion_toward_government_more_than_ai',
        labels: ['1<br>совсем не согласен(на)', '2', '3', '4<br>нейтрально', '5', '6', '7<br>полностью согласен(на)'],
        required: true
      }
    ],
    randomize_question_order: false,
    data: {
      participant_id: PARTICIPANT_ID,
      task: 'post_questionnaire',
      local_time: nowLocal(),
      iso_time: nowISO()
    },
    on_finish: function(data) {
      Object.keys(data.response || {}).forEach(function(k) {
        data[k] = data.response[k];
      });
    }
  });

  timeline.push({
    type: jsPsychSurveyHtmlForm,
    preamble: `
      <div class="card center-card">
        <h2>Проверка понимания</h2>
        <p>Ответьте, пожалуйста, на последние вопросы.</p>
      </div>
    `,
    html: `
      <div class="card center-card">
        <p>
          <label>Как вы думаете, что изучалось в этом исследовании?<br>
            <textarea name="study_guess" rows="4" style="width:100%; padding:10px;" required></textarea>
          </label>
        </p>
        <p>
          <label>Было ли что-то, что показалось вам странным или подозрительным?<br>
            <textarea name="suspicion" rows="4" style="width:100%; padding:10px;" required></textarea>
          </label>
        </p>
        <p>
          <label>Насколько правдоподобным вам показался сценарий с ИИ-системами?<br>
            <input name="believability" type="range" min="0" max="100" value="50" step="1" style="width:100%;">
          </label>
        </p>
      </div>
    `,
    button_label: 'Завершить',
    data: {
      participant_id: PARTICIPANT_ID,
      task: 'suspicion_checks',
      local_time: nowLocal(),
      iso_time: nowISO()
    },
    on_finish: function(data) {
      data.study_guess = data.response.study_guess;
      data.suspicion = data.response.suspicion;
      data.believability = Number(data.response.believability);
    }
  });

  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="card center-card">
        <h2>Дебрифинг</h2>
        <p>
          Спасибо за участие. Это был экспериментальный сценарий, созданный для изучения того,
          как люди реагируют на рекомендации ИИ, когда ИИ представлен как голос некоторой социальной или национальной группы.
        </p>
        <p>
          Указанные значения, описание инициативы и «голосующий вес» ИИ не являются реальными решениями государственных органов.
          Основной интерес исследования - меняются ли оценки участников после рекомендации ИИ, возникает ли сопротивление
          рекомендации и переносится ли реакция на страну/группу, которую ИИ якобы представляет.
        </p>
      </div>
    `,
    choices: ['Показать ссылки для скачивания данных'],
    data: {
      participant_id: PARTICIPANT_ID,
      task: 'debrief',
      local_time: nowLocal(),
      iso_time: nowISO()
    }
  });

  jsPsych.run(timeline);
})();
</script>
</body>
</html>
